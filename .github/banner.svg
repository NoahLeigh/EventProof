<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" role="img" aria-label="EventProof banner: a dark botanical nocturne of lily-pads and white flowers with a gold flourish and the line EventProof, Volume One">
  <defs>
    <radialGradient id="ep-bg" cx="20%" cy="0%" r="110%">
      <stop offset="0%" stop-color="#16271e"/>
      <stop offset="45%" stop-color="#0e1a15"/>
      <stop offset="100%" stop-color="#0a1310"/>
    </radialGradient>
    <linearGradient id="ep-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c7e34"/>
      <stop offset="45%" stop-color="#d9b24f"/>
      <stop offset="52%" stop-color="#f4e3a8"/>
      <stop offset="60%" stop-color="#d9b24f"/>
      <stop offset="100%" stop-color="#9c7e34"/>
    </linearGradient>
    <radialGradient id="ep-pad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#244534"/>
      <stop offset="100%" stop-color="#14241c"/>
    </radialGradient>
    <!-- a single five-petal white flower -->
    <g id="ep-flower">
      <g fill="#f1ead8">
        <ellipse cx="0" cy="-11" rx="5.5" ry="10"/>
        <ellipse cx="0" cy="-11" rx="5.5" ry="10" transform="rotate(72)"/>
        <ellipse cx="0" cy="-11" rx="5.5" ry="10" transform="rotate(144)"/>
        <ellipse cx="0" cy="-11" rx="5.5" ry="10" transform="rotate(216)"/>
        <ellipse cx="0" cy="-11" rx="5.5" ry="10" transform="rotate(288)"/>
      </g>
      <circle r="5" fill="#d9b24f"/>
    </g>
    <!-- lily pad with notch -->
    <g id="ep-pad">
      <path d="M0 0 A38 30 0 1 1 6 -4 L2 1 Z" fill="url(#ep-pad)" stroke="#2c463a" stroke-width="1.2"/>
    </g>
  </defs>

  <rect width="1000" height="260" rx="6" fill="url(#ep-bg)"/>
  <!-- soft pond glows bottom-right -->
  <ellipse cx="880" cy="250" rx="260" ry="120" fill="#1b3327" opacity="0.45"/>

  <!-- ===== botanical cluster, left & right ===== -->
  <!-- left pads -->
  <use href="#ep-pad" transform="translate(70,196) scale(1.5)"/>
  <use href="#ep-pad" transform="translate(150,224) scale(1.05) rotate(40)"/>
  <use href="#ep-pad" transform="translate(40,150) scale(0.8) rotate(-20)"/>
  <use href="#ep-flower" transform="translate(96,176) scale(1.25)"/>
  <use href="#ep-flower" transform="translate(150,210) scale(0.85)"/>

  <!-- right pads -->
  <use href="#ep-pad" transform="translate(900,206) scale(1.7) rotate(15)"/>
  <use href="#ep-pad" transform="translate(820,176) scale(1.0) rotate(-30)"/>
  <use href="#ep-pad" transform="translate(956,150) scale(0.75) rotate(60)"/>
  <use href="#ep-flower" transform="translate(906,178) scale(1.35)"/>
  <use href="#ep-flower" transform="translate(840,150) scale(0.8)"/>
  <!-- a floating petal -->
  <use href="#ep-flower" transform="translate(700,58) scale(0.6)" opacity="0.85"/>

  <!-- gold flourish rule under the wordmark -->
  <g stroke="url(#ep-gold)" fill="none" stroke-width="1.6">
    <path d="M330 168 H560" />
    <path d="M560 168 q14 0 20 -8 q6 8 20 8" />
    <path d="M330 168 q-14 0 -20 -8 q-6 8 -20 8" />
  </g>
  <circle cx="500" cy="168" r="2.4" fill="#d9b24f"/>

  <!-- wordmark -->
  <text x="500" y="120" text-anchor="middle" font-family="Cardo, Georgia, 'Times New Roman', serif" font-size="62" fill="#f1ead8" letter-spacing="1">EventProof</text>
  <!-- VOL line -->
  <text x="500" y="204" text-anchor="middle" font-family="Cardo, Georgia, serif" font-style="italic" font-size="18" fill="url(#ep-gold)" letter-spacing="6">EVENTPROOF · VOL. 01</text>
  <!-- tagline -->
  <text x="500" y="232" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-size="11" letter-spacing="5" fill="#7d8c7e">PHOTOGRAPHY FOR THE NIGHT — SOLD ONE FRAME AT A TIME</text>
</svg>
